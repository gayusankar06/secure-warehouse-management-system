<app-sidebar></app-sidebar>

<div class="tracking-container" style="padding: 20px; margin-left: 250px;">
  <!-- PAGE HEADER -->
  <div style="display: flex; justify-content: space-between; margin-bottom: 24px;">
    <div>
      <h1 style="font-weight: 600;">Shipment Tracking</h1>
      <p style="color: var(--text-secondary);">Secure Logistics & Delivery Monitoring</p>
    </div>
    <div>
      <span class="badge" style="background: var(--accent-color); color: white; padding: 8px 16px;">
        {{ role }} ACCESS
      </span>
    </div>
  </div>

  <!-- ADD SHIPMENT -->
  <div class="glass-card mb-4" style="margin-bottom: 24px;">
    <h3 style="margin-bottom: 16px;">Update Tracking</h3>
    <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 16px;">
      <input type="number" class="form-control" placeholder="Order ID" [(ngModel)]="orderId">
      <input class="form-control" placeholder="Location" [(ngModel)]="location">
      <select class="form-control" [(ngModel)]="status">
        <option value="">Select Status</option>
        <option value="Pending">Pending</option>
        <option value="Processing">Processing</option>
        <option value="Packed">Packed</option>
        <option value="Shipped">Shipped</option>
        <option value="Delivered">Delivered</option>
        <option value="Cancelled">Cancelled</option>
      </select>
    </div>
    <div style="display: flex; gap: 12px;">
      <button class="btn-primary" (click)="addTracking()">Add Tracking Step</button>
      <button class="btn-primary" style="background: var(--text-secondary);" (click)="loadTracking()">Load History</button>
    </div>
  </div>

  <!-- SHIPMENT TABLE -->
  <div class="glass-card">
    <h3 style="margin-bottom: 16px;">Tracking History</h3>
    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Order ID</th>
            <th>Location</th>
            <th>Status</th>
            <th>Timestamp</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let shipment of shipments">
            <td>{{shipment.id}}</td>
            <td>{{shipment.orderId}}</td>
            <td>{{shipment.location}}</td>
            <td>
              <span class="badge" 
                [ngClass]="{
                  'badge-success': shipment.status === 'Delivered',
                  'badge-warning': shipment.status === 'Pending' || shipment.status === 'Processing',
                  'badge-info': shipment.status === 'Packed' || shipment.status === 'Shipped',
                  'badge-danger': shipment.status === 'Cancelled'
                }">
                {{ shipment.status }}
              </span>
            </td>
            <td>{{shipment.timestamp | date:'medium'}}</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
